parameters:
- name: sleepTime
  displayName: Number of seconds to wait between detecting IP address
  type: number
  default: 120
  
trigger: none
# schedules:
# - cron: '0 1 * * *'
#   displayName: 'Nightly (UTC)'
#   always: 'true'
#   branches:
#     include:
#     - main

variables:
  sleepTime: ${{ parameters.sleepTime }}

jobs:
- job: detectIP
  displayName: 'Check client IP address consistency'
  pool:
    vmImage: 'ubuntu-latest'
  timeoutInMinutes: 360
  steps:
  - pwsh: |
      &{$ErrorActionPreference = 'SilentlyContinue';$script:metaData =(Invoke-RestMethod -Headers @{"Metadata"="true"} -Method GET -NoProxy -Uri "http://169.254.169.254/metadata/instance/compute?api-version=2021-02-01" -TimeoutSec 1)}
      $script:metaData
    displayName: 'Get VM instance metadata'

  - pwsh: |
      Invoke-RestMethod https://api.ipify.org | Set-Variable ipAddress
      Write-Host "IP Address: ${ipAddress}"
      Write-Output "##vso[task.setvariable variable=ipAddress]${ipAddress}"
    displayName: 'Detect client IP address'

  - pwsh: |
      $previousIPAddress = "$(ipAddress)"
      Write-Host "Previous IP Address: ${previousIPAddress}"
      Write-Host "Sleeping $(sleepTime) seconds..."
      Start-Sleep -Seconds $(sleepTime)
      Invoke-RestMethod https://api.ipify.org | Set-Variable ipAddress
      if ($previousIPAddress -ne $ipAddress) {
        throw "Detected IP address ${ipAddress} is different from ${previousIPAddress} detected in previous task"
      }
      Write-Host "IP Address: ${ipAddress}"
      Write-Output "##vso[task.setvariable variable=ipAddress]${ipAddress}"
    displayName: 'Detect client IP address'

  - pwsh: |
      $previousIPAddress = "$(ipAddress)"
