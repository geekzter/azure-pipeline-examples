trigger: none
schedules:
- cron: '0 1 * * *'
  displayName: 'Nightly build (UTC)'
  always: 'true'
  branches:
    include:
    - main

variables:
  artifactDirectory: '$(Build.SourcesDirectory)/terraform'

# TODO: Generate unique artifact name e.g. $[format('{0:yyyyMMdd}', pipeline.startTime)]

jobs:
- job: retryDemo
  displayName: 'Retry demo'
  pool:
    name: 'Azure Pipelines'
  steps:
  - pwsh: |
      mkdir -p $(artifactDirectory)
      cd $(artifactDirectory)
      echo content > artifact.txt
    displayName: 'Generate artifacts'
  - publish: $(artifactDirectory)
    displayName: 'Publish artifact'
    artifact: 'artifact'
  - pwsh: |
      mkdir -p $(artifactDirectory)
      cd $(artifactDirectory)
      echo content > artifact.txt
    displayName: 'Update artifacts'
  - publish: $(artifactDirectory)
    displayName: 'Publish artifact again'
    artifact: 'artifact'
